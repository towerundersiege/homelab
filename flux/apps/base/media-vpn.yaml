apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gluetun
  namespace: flux-system
spec:
  interval: 15m
  targetNamespace: vpn
  chart:
    spec:
      chart: app-template
      version: "3.5.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: qmcgaw/gluetun
              tag: "latest"
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
            env:
              TZ: Europe/London
              VPN_SERVICE_PROVIDER: REPLACE_ME
              VPN_TYPE: wireguard
    service:
      main:
        enabled: false
