apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: flux-system
spec:
  interval: 15m
  targetNamespace: apps
  chart:
    spec:
      chart: gitea
      version: "10.6.0"
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
        namespace: flux-system
  values:
    ingress:
      enabled: true
      className: cilium
      hosts:
        - host: gitea.towerundersiege.com
          paths:
            - path: /
              pathType: Prefix
    persistence:
      enabled: true
      storageClass: nfs-client
      size: 10Gi
