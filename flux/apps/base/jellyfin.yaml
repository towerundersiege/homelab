apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  interval: 15m
  targetNamespace: apps
  chart:
    spec:
      chart: app-template
      version: "3.5.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: jellyfin/jellyfin
              tag: "10.10.1"
    service:
      main:
        controller: main
        ports:
          http:
            port: 8096
            targetPort: 8096
    ingress:
      main:
        enabled: true
        className: cilium
        hosts:
          - host: jellyfin.towerundersiege.com
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: nfs-client
        size: 10Gi
        globalMounts:
          - path: /config
      media:
        enabled: true
        type: nfs
        server: 192.168.1.100
        path: /media
        globalMounts:
          - path: /media
