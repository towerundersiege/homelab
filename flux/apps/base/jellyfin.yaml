apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  interval: 15m
  targetNamespace: apps
  chart:
    spec:
      chart: app-template
      version: "3.5.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: jellyfin/jellyfin
              tag: "10.10.1"
    service:
      main:
        ports:
          http:
            port: 8096
            targetPort: 8096
    ingress:
      main:
        enabled: true
        className: cilium
        hosts:
          - host: jellyfin.towerundersiege.com
            paths:
              - path: /
                pathType: Prefix
    persistence:
      config:
        enabled: true
        storageClass: nfs-client
        size: 10Gi
      media:
        enabled: true
        type: hostPath
        hostPath: /srv/shared/media
