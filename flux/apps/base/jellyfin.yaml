apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  releaseName: jellyfin
  interval: 15m
  targetNamespace: apps
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Ingress
              name: jellyfin
            patch: |
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: jellyfin
                annotations:
                  external-dns.alpha.kubernetes.io/target: 192.168.1.110
              spec:
                tls:
                  - secretName: cilium-apps-tls
                    hosts:
                      - jellyfin.towerundersiege.com
  chart:
    spec:
      chart: app-template
      version: "3.5.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    fullnameOverride: jellyfin
    controllers:
      main:
        containers:
          main:
            image:
              repository: jellyfin/jellyfin
              tag: "10.11.8"
            env:
              JELLYFIN_PublishedServerUrl: https://jellyfin.towerundersiege.com
    service:
      main:
        controller: main
        ports:
          http:
            port: 8096
            targetPort: 8096
    ingress:
      main:
        enabled: true
        className: cilium
        annotations:
          external-dns.alpha.kubernetes.io/target: 192.168.1.110
        hosts:
          - host: jellyfin.towerundersiege.com
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
    persistence:
      config:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: apps-jellyfin-config
        globalMounts:
          - path: /config
      media:
        enabled: true
        type: nfs
        server: 192.168.1.100
        path: /media
        globalMounts:
          - path: /media
