apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-secrets
  namespace: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: vaultwarden-secrets
  data:
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: apps/vaultwarden
        property: admin_token
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: flux-system
spec:
  interval: 15m
  targetNamespace: apps
  chart:
    spec:
      chart: app-template
      version: "3.5.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: vaultwarden/server
              tag: "1.32.1"
            env:
              SIGNUPS_ALLOWED: "false"
            envFrom:
              - secretRef:
                  name: vaultwarden-secrets
    service:
      main:
        ports:
          http:
            port: 80
            targetPort: 80
    ingress:
      main:
        enabled: true
        className: cilium
        hosts:
          - host: vaultwarden.towerundersiege.com
            paths:
              - path: /
                pathType: Prefix
    persistence:
      data:
        enabled: true
        storageClass: nfs-client
        size: 5Gi
