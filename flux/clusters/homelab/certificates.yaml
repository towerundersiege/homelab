apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: certificates
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 10m
  path: ./flux/infrastructure/certificates
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  wait: true
