apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: http://penzance:8200
      path: homelab
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: homelab
          serviceAccountRef:
            name: external-secrets-external-secrets
            namespace: external-secrets
