apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-subdir-external-provisioner
  namespace: flux-system
spec:
  interval: 15m
  targetNamespace: storage
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: "4.0.18"
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: flux-system
  values:
    nfs:
      server: 192.168.1.100
      path: /srv/storage/pool/k8s/lyonesse/apps
    storageClass:
      create: true
      defaultClass: true
      name: nfs-client
      reclaimPolicy: Retain
    podSecurityPolicy:
      enabled: false
