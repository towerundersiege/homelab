apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel
  namespace: ingress
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: cloudflared-tunnel
  data:
    - secretKey: TUNNEL_TOKEN
      remoteRef:
        key: cloudflare
        property: tunnel_token
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: flux-system
spec:
  interval: 15m
  targetNamespace: ingress
  chart:
    spec:
      chart: app-template
      version: "3.5.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: cloudflare/cloudflared
              tag: "2024.10.0"
            args:
              - tunnel
              - --no-autoupdate
              - run
            envFrom:
              - secretRef:
                  name: cloudflared-tunnel
    service:
      main:
        enabled: false
