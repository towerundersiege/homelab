name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 6"

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v44.0.3
        env:
          RENOVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
