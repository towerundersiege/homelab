---
- name: Install k3s prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - open-iscsi
    state: present
    update_cache: true

- name: Create k3s config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Render k3s config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"

- name: Install k3s server on control plane
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -
  args:
    creates: /usr/local/bin/k3s
  when: "'k3s_control_plane' in group_names"

- name: Install k3s agent on workers
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" INSTALL_K3S_EXEC="agent" sh -
  args:
    creates: /usr/local/bin/k3s-agent
  when: "'k3s_workers' in group_names"

- name: Ensure k3s service is enabled on control plane
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true
  when: "'k3s_control_plane' in group_names"

- name: Ensure k3s-agent service is enabled on workers
  ansible.builtin.service:
    name: k3s-agent
    state: started
    enabled: true
  when: "'k3s_workers' in group_names"
