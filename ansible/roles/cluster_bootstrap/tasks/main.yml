---
- name: Ensure external-dns namespace exists
  ansible.builtin.command: kubectl create namespace external-dns
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: external_dns_namespace
  changed_when: external_dns_namespace.rc == 0
  failed_when:
    - external_dns_namespace.rc != 0
    - "'already exists' not in external_dns_namespace.stderr"

- name: Render external-dns Pi-hole secret manifest
  ansible.builtin.copy:
    dest: /tmp/external-dns-pihole-secret.yaml
    mode: "0600"
    content: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: external-dns-pihole
        namespace: external-dns
      type: Opaque
      stringData:
        EXTERNAL_DNS_PIHOLE_PASSWORD: "{{ pihole_web_password }}"

- name: Apply external-dns Pi-hole secret
  ansible.builtin.command: kubectl apply -f /tmp/external-dns-pihole-secret.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
