---
- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ 'amd64' if ansible_architecture in ['x86_64', 'amd64'] else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure systemd-resolved drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"

- name: Disable systemd-resolved DNS stub listener for Pi-hole
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/pihole.conf
    mode: "0644"
    content: |
      [Resolve]
      DNSStubListener=no
  notify: Restart systemd-resolved

- name: Create stack directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ docker_stack_root }}"
    - "{{ penzance_data_root }}"
    - "{{ penzance_data_root }}/config"
    - "{{ penzance_data_root }}/config/caddy"
    - "{{ penzance_data_root }}/config/caddy/data"
    - "{{ penzance_data_root }}/config/caddy/config"
    - "{{ penzance_data_root }}/config/pihole"
    - "{{ penzance_data_root }}/config/pihole/dnsmasq.d"
    - "{{ penzance_data_root }}/media"
    - "{{ penzance_data_root }}/media/movies"
    - "{{ penzance_data_root }}/media/music"
    - "{{ penzance_data_root }}/media/tv"
    - "{{ shared_storage_media_root }}"
    - "{{ shared_storage_media_root }}/movies"
    - "{{ shared_storage_media_root }}/music"
    - "{{ shared_storage_media_root }}/tv"

- name: Render penzance Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ penzance_caddyfile_path }}"
    mode: "0644"
  notify: Restart caddy container

- name: Render Pi-hole local DNS records
  ansible.builtin.template:
    src: 05-local-dns.conf.j2
    dest: "{{ penzance_data_root }}/config/pihole/dnsmasq.d/05-local-dns.conf"
    mode: "0644"
  notify: Restart pihole container

- name: Render penzance docker compose stack
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ penzance_compose_file }}"
    mode: "0640"

- name: Start penzance Docker stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_stack_root }}"
    state: present
